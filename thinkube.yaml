apiVersion: thinkube.io/v1
kind: ThinkubeDeployment
metadata:
  name: "{{ project_name }}"

spec:
  containers:
    - name: seaweedfs-gateway
      build: .
      port: 8080
      size: small
      health: /api/health
      test:
        enabled: false
  routes:
    - path: /
      to: seaweedfs-gateway
